let filtered=[...ALL];
let idx=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
shuffle(filtered);

const labels={suave:'Suave',media:'Media',fuerte:'Fuerte',extremo:'Extremo'};

function show(anim){
  const card=document.getElementById('card');
  const txt=document.getElementById('cardText');
  const badge=document.getElementById('badge');
  const num=document.getElementById('cardNum');
  const counter=document.getElementById('counter');
  if(!filtered.length){txt.textContent='No hay preguntas para este nivel.';badge.className='level-badge';badge.textContent='';num.textContent='';counter.textContent='';return}
  const q=filtered[idx];
  const update=()=>{
    txt.textContent=q.t;
    badge.className='level-badge badge-'+q.l;
    badge.textContent=labels[q.l]||q.l;
    num.textContent=(idx+1)+' / '+filtered.length;
    counter.textContent='';
  };
  if(anim){
    card.classList.add('flip-out');
    setTimeout(()=>{update();card.classList.remove('flip-out');card.classList.add('flip-in');requestAnimationFrame(()=>requestAnimationFrame(()=>card.classList.remove('flip-in')));},150);
  }else update();
}

document.getElementById('btnNext').addEventListener('click',()=>{idx=(idx+1)%filtered.length;show(true)});
document.getElementById('btnPrev').addEventListener('click',()=>{idx=(idx-1+filtered.length)%filtered.length;show(true)});

document.querySelectorAll('.chip').forEach(chip=>{
  chip.addEventListener('click',function(){
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    this.classList.add('active');
    const lvl=this.dataset.level;
    filtered=lvl==='all'?[...ALL]:ALL.filter(q=>q.l===lvl);
    shuffle(filtered);idx=0;show(false);
  });
});

show(false);
